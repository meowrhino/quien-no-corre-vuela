<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Calendario · Quien no corre, vuela</title>
    <link rel="stylesheet" href="css/styles.css" />
    <script type="module" src="js/pages/calendario.js"></script>
  </head>
  <body>
    <main>
      <div class="cal-wrap">
        <div class="cal-track" data-cal-track>
          <p class="estado" data-i18n="loading">Cargando…</p>
        </div>
        <div class="cal-now-chip" data-now hidden>
          <span class="dot" data-now-dot>·</span>
          <span>
            <span class="now-label" data-i18n="cal.now">ahora en España</span><br />
            <span class="now-time" data-now-time></span>
          </span>
        </div>
      </div>
    </main>
  </body>
</html>
